name: Wine Dataset Preprocessing

on:
  push:
    branches:
      - main
    paths:
      - "wine_raw/**"
      - "preprocessing/automate_Sakti.py"
      - ".github/workflows/preprocessing.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      - name: Run automated preprocessing
        run: python preprocessing/automate_Sakti.py

      - name: Commit latest preprocessed dataset
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update preprocessed wine dataset"
          file_pattern: "preprocessing/wine_preprocessing/*"
